<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOiD Exhibition Scenario Simulator v0.5</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script async src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    /* ============ RESET & BASE ============ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Phase 0 색상 팔레트 */
      --bg-0: #0a0a0a;
      --bg-1: #1a1a1a;
      --bg-2: #2a2a2a;
      --bg-3: #3a3a3a;
      --text-primary: #e5e5e5;
      --text-secondary: #a0a0a0;
      --lg-red: #E63950;
      --cyan: #00D9FF;
      --success: #22C55E;
      --warn: #F59E0B;
      --error: #EF4444;

      /* GHRIM 신뢰도 색상 */
      --rel-a: #059669;
      --rel-b: #10B981;
      --rel-c: #F59E0B;
      --rel-d: #F97316;
      --rel-e: #EF4444;
      --rel-f: #991B1B;

      /* 국가별 색상 */
      --country-eu: #003399;
      --country-us: #3C3B6E;
      --country-cn: #DE2910;
      --country-jp: #BC002D;
      --country-kr: #0047A0;

      /* Gesture 상태 */
      --status-complete: #22C55E;
      --status-progress: #3B82F6;
      --status-unverified: #6B7280;
      --status-notaddressed: #EF4444;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-0);
      color: var(--text-primary);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: 44px 1fr 240px;
      grid-template-columns: 260px 1fr 280px;
      width: 100%;
      height: 100%;
      gap: 0;
    }

    /* ============ TOPBAR ============ */
    .topbar {
      grid-column: 1 / -1;
      background: var(--bg-1);
      border-bottom: 1px solid var(--bg-3);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: var(--cyan);
    }

    .scenario-name-input {
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-primary);
      padding: 6px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      width: 200px;
      border-radius: 3px;
    }

    .scenario-name-input:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .d-day {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* 모드 토글 (세그먼트 컨트롤) */
    .mode-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      border-radius: 3px;
      padding: 2px;
    }

    .mode-toggle button {
      flex: 1;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-toggle button.active {
      background: var(--lg-red);
      color: white;
      border-radius: 2px;
    }

    .topbar-right {
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      padding: 6px 14px;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-primary);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: var(--bg-3);
      border-color: var(--cyan);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* ============ SIDEBAR LEFT ============ */
    .sidebar-left {
      grid-row: 2;
      grid-column: 1;
      background: var(--bg-1);
      border-right: 1px solid var(--bg-3);
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .catalog-item {
      padding: 10px;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .catalog-item:hover {
      background: var(--bg-3);
      border-color: var(--cyan);
    }

    .catalog-item-name {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .catalog-item-dims {
      font-size: 10px;
      color: var(--text-secondary);
      font-family: 'IBM Plex Mono', monospace;
    }

    .placed-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .placed-item {
      padding: 8px;
      background: var(--bg-2);
      border-left: 3px solid var(--cyan);
      margin-bottom: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .placed-item:hover {
      background: var(--bg-3);
    }

    .placed-item.selected {
      background: var(--bg-3);
      border-left-color: var(--lg-red);
    }

    /* ============ VIEWPORT ============ */
    .viewport {
      grid-row: 2;
      grid-column: 2;
      position: relative;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viewport-hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid var(--bg-3);
      border-radius: 3px;
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-secondary);
      pointer-events: none;
      line-height: 1.6;
    }

    /* ============ SIDEBAR RIGHT ============ */
    .sidebar-right {
      grid-row: 2;
      grid-column: 3;
      background: var(--bg-1);
      border-left: 1px solid var(--bg-3);
      overflow-y: auto;
      padding: 16px;
    }

    .properties-panel {
      display: none;
    }

    .properties-panel.active {
      display: block;
    }

    .property-row {
      margin-bottom: 12px;
    }

    .property-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      display: block;
    }

    .property-input,
    .property-select {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-primary);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      border-radius: 3px;
    }

    .property-input:focus,
    .property-select:focus {
      outline: none;
      border-color: var(--cyan);
    }

    .property-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-primary);
      background: var(--bg-2);
      padding: 6px 8px;
      border-radius: 3px;
    }

    .property-button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .property-button {
      padding: 6px 8px;
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-primary);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .property-button:hover {
      background: var(--bg-3);
      border-color: var(--cyan);
    }

    .property-button.danger {
      color: var(--error);
    }

    .property-button.danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    /* ============ TIMELINE ============ */
    .timeline {
      grid-row: 3;
      grid-column: 1 / -1;
      background: var(--bg-1);
      border-top: 1px solid var(--bg-3);
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
    }

    .timeline-labels {
      background: var(--bg-2);
      border-right: 1px solid var(--bg-3);
      padding: 8px;
      overflow-y: auto;
      max-height: 240px;
    }

    .timeline-track-label {
      height: 20px;
      padding: 2px 8px;
      font-size: 10px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--bg-3);
      display: flex;
      align-items: center;
      font-weight: 600;
    }

    .timeline-content {
      background: var(--bg-1);
      overflow-x: auto;
      overflow-y: auto;
      position: relative;
    }

    .timeline-ruler {
      position: sticky;
      top: 0;
      height: 24px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--bg-3);
      z-index: 10;
    }

    .timeline-tracks {
      position: relative;
      min-width: 100%;
      padding-bottom: 8px;
    }

    .timeline-track-group {
      border-bottom: 1px solid var(--bg-3);
    }

    .timeline-track-row {
      height: 20px;
      position: relative;
      background: var(--bg-1);
    }

    .timeline-track-row.gesture {
      background: rgba(0, 217, 255, 0.02);
    }

    .keyframe-marker {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--cyan);
      border: 1px solid var(--bg-0);
      border-radius: 50%;
      top: 50%;
      transform: translate(-4px, -4px);
      cursor: move;
      z-index: 5;
    }

    .gesture-block {
      position: absolute;
      height: 18px;
      background: var(--lg-red);
      border: 1px solid rgba(230, 57, 80, 0.8);
      border-radius: 2px;
      font-size: 9px;
      color: white;
      top: 1px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      cursor: move;
      z-index: 4;
    }

    .gesture-block:hover {
      background: #ff4960;
    }

    .gesture-block.selected {
      box-shadow: 0 0 0 2px var(--cyan);
    }

    .gesture-block-handle {
      position: absolute;
      width: 4px;
      height: 100%;
      right: 0;
      top: 0;
      cursor: col-resize;
      background: transparent;
    }

    .playhead {
      position: absolute;
      width: 2px;
      height: 100%;
      background: var(--cyan);
      top: 0;
      left: 0;
      z-index: 20;
      pointer-events: none;
    }

    /* ============ TOAST ============ */
    .toast-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 1000;
    }

    .toast {
      background: var(--bg-2);
      border: 1px solid var(--bg-3);
      color: var(--text-primary);
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 3px;
      font-size: 12px;
      animation: slideIn 0.3s ease-out;
      max-width: 300px;
    }

    .toast.success {
      border-color: var(--success);
      color: var(--success);
    }

    .toast.error {
      border-color: var(--error);
      color: var(--error);
    }

    @keyframes slideIn {
      from {
        transform: translateX(320px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ============ SCROLLBARS ============ */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-1);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-3);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo">CLOiD SIMULATOR</div>
        <input type="text" class="scenario-name-input" id="scenarioName" placeholder="Scenario Name" value="Exhibition_01">
        <div class="d-day" id="dday">D-Day: 180 days</div>
      </div>

      <!-- 모드 토글 -->
      <div class="mode-toggle">
        <button class="active" data-mode="build">BUILD</button>
        <button data-mode="choreo">CHOREO</button>
      </div>

      <div class="topbar-right">
        <button class="btn-primary" id="loadBtn">LOAD</button>
        <button class="btn-primary" id="exportBtn">EXPORT</button>
        <button class="btn-primary" id="saveBtn">SAVE</button>
      </div>
    </div>

    <!-- SIDEBAR LEFT -->
    <div class="sidebar-left" id="sidebarLeft">
      <!-- BUILD 모드 콘텐츠 -->
      <div id="buildMode" style="display: block;">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Furniture Catalog</div>
          <div class="catalog-grid" id="furnitureCatalog"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Placed Furniture</div>
          <div class="placed-list" id="placedFurnitureList"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Booth</div>
          <div id="boothSettings"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Camera</div>
          <div id="cameraPresets"></div>
        </div>
      </div>

      <!-- CHOREO 모드 콘텐츠 -->
      <div id="choreoMode" style="display: none;">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Robots</div>
          <div class="placed-list" id="robotList"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Booth</div>
          <div id="boothSettingsChoreo"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">Camera</div>
          <div id="cameraPresetsChoreo"></div>
        </div>
      </div>
    </div>

    <!-- VIEWPORT -->
    <div class="viewport">
      <canvas id="canvas"></canvas>
      <div class="viewport-hud" id="hud">
        <div>MODE <span id="hudMode">BUILD</span></div>
        <div>CURSOR <span id="hudCursor">0.0, 0.0</span> ft</div>
        <div>BOOTH <span id="hudBooth">80 × 80</span> ft</div>
        <div>ITEMS <span id="hudItems">0 furniture / 0 robots</span></div>
      </div>
    </div>

    <!-- SIDEBAR RIGHT -->
    <div class="sidebar-right" id="sidebarRight">
      <div id="propertiesFurniture" class="properties-panel">
        <h3 style="margin-bottom: 12px; font-size: 12px; text-transform: uppercase;">Furniture Properties</h3>
        <div class="property-row">
          <label class="property-label">Name</label>
          <input type="text" class="property-input" id="propFurnitureName">
        </div>
        <div class="property-row">
          <label class="property-label">Type</label>
          <div class="property-value" id="propFurnitureType">-</div>
        </div>
        <div class="property-row">
          <label class="property-label">Position X (ft)</label>
          <input type="number" class="property-input" id="propFurnitureX" step="0.1">
        </div>
        <div class="property-row">
          <label class="property-label">Position Z (ft)</label>
          <input type="number" class="property-input" id="propFurnitureZ" step="0.1">
        </div>
        <div class="property-row">
          <label class="property-label">Rotation Y (°)</label>
          <input type="number" class="property-input" id="propFurnitureRotY" step="1">
        </div>
        <div class="property-row">
          <label class="property-label">Dimensions</label>
          <div class="property-value" id="propFurnitureDims">-</div>
        </div>
        <div class="property-button-group">
          <button class="property-button" id="propFurnitureDelete danger">DELETE</button>
          <button class="property-button" id="propFurnitureDuplicate">DUPLICATE</button>
        </div>
        <div class="property-button-group">
          <button class="property-button" id="propFurnitureResetRot">RESET ROT</button>
          <button class="property-button" id="propFurnitureCenter">CENTER</button>
        </div>
      </div>

      <div id="propertiesRobot" class="properties-panel">
        <h3 style="margin-bottom: 12px; font-size: 12px; text-transform: uppercase;">Robot Properties</h3>
        <div class="property-value" id="propRobotName" style="margin-bottom: 12px;">-</div>
        <div id="robotPropertyContent"></div>
      </div>

      <div id="propertiesGesture" class="properties-panel">
        <h3 style="margin-bottom: 12px; font-size: 12px; text-transform: uppercase;">Gesture Properties</h3>
        <div class="property-row">
          <label class="property-label">Type</label>
          <select class="property-select" id="propGestureType"></select>
        </div>
        <div class="property-row">
          <label class="property-label">Start Time (s)</label>
          <input type="number" class="property-input" id="propGestureStart" step="0.1">
        </div>
        <div class="property-row">
          <label class="property-label">Duration (s)</label>
          <input type="number" class="property-input" id="propGestureDuration" step="0.1">
        </div>
        <div id="propGestureParams"></div>
        <div class="property-button-group">
          <button class="property-button danger" id="propGestureDelete">DELETE</button>
        </div>
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="timeline">
      <div class="timeline-labels" id="timelineLabels"></div>
      <div class="timeline-content" id="timelineContent">
        <div class="timeline-ruler" id="timelineRuler"></div>
        <div class="timeline-tracks" id="timelineTracks"></div>
        <div class="playhead" id="playhead"></div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    /* ============ CONSTANTS ============ */
    const FT_TO_M = 0.3048;
    const SCENE_WIDTH = 80; // default booth width in ft

    const FURNITURE_TYPES = {
      MAIN_STAGE: 'MAIN_STAGE',
      PRODUCT_SHELF: 'PRODUCT_SHELF',
      SCREEN_WALL: 'SCREEN_WALL',
      EXPERIENCE_ZONE: 'EXPERIENCE_ZONE',
      INFO_DESK: 'INFO_DESK',
    };

    const FURNITURE_DIMS = {
      MAIN_STAGE: { width: 4.0, depth: 3.0, height: 0.4 },
      PRODUCT_SHELF: { width: 1.8, depth: 0.6, height: 1.5 },
      SCREEN_WALL: { width: 3.0, depth: 0.2, height: 2.5 },
      EXPERIENCE_ZONE: { width: 2.5, depth: 2.5, height: 0.1 },
      INFO_DESK: { width: 2.0, depth: 0.8, height: 1.1 },
    };

    const FURNITURE_SNAP = {
      MAIN_STAGE: 'free',
      PRODUCT_SHELF: 'wall',
      SCREEN_WALL: 'wall',
      EXPERIENCE_ZONE: 'free',
      INFO_DESK: 'free',
    };

    const FURNITURE_COLORS = {
      MAIN_STAGE: 0xA50034,
      PRODUCT_SHELF: 0x2a2a2a,
      SCREEN_WALL: 0x0a0a0a,
      EXPERIENCE_ZONE: 0x00D9FF,
      INFO_DESK: 0xf0f0f0,
    };

    const GESTURE_TYPES = [
      'IDLE',
      'WAVE',
      'POINT',
      'PICKUP',
      'BOW',
      'WALK',
      'SCAN',
    ];

    const WALL_SNAP_DIST = 0.5; // meters

    /* ============ STATE ============ */
    const state = {
      mode: 'build',
      booth: {
        widthFt: 80,
        depthFt: 80,
      },
      duration: 180,
      currentTime: 0,
      playing: false,
      furniture: [],
      robots: [],
      selectedType: null, // 'furniture' | 'robot' | 'gesture'
      selectedId: null,
      selectedGestureId: null,
      selectedRobotId: null,
      furnitureIdCounter: 0,
    };

    /* ============ THREE.JS SETUP ============ */
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 100, 500);

    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
    camera.position.set(15, 20, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(20, 30, 20);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 2048;
    directionalLight.shadow.mapSize.height = 2048;
    directionalLight.shadow.camera.left = -60;
    directionalLight.shadow.camera.right = 60;
    directionalLight.shadow.camera.top = 60;
    directionalLight.shadow.camera.bottom = -60;
    directionalLight.shadow.camera.far = 200;
    scene.add(directionalLight);

    // Group managers
    const boothGroup = new THREE.Group();
    scene.add(boothGroup);
    const furnitureGroup = new THREE.Group();
    boothGroup.add(furnitureGroup);
    const robotsGroup = new THREE.Group();
    boothGroup.add(robotsGroup);
    const helpersGroup = new THREE.Group();
    boothGroup.add(helpersGroup);

    // Mesh storage
    const robotMeshes = {}; // id -> { group, instance }
    const furnitureMeshes = {}; // id -> { group, instance }

    /* ============ UTILITY ============ */
    function showToast(msg, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function generateId(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    }

    /* ============ BOOTH ============ */
    function rebuildBooth() {
      // Remove old booth
      boothGroup.children.forEach(c => {
        if (c.userData?.isBooth) boothGroup.remove(c);
      });

      const wftm = state.booth.widthFt * FT_TO_M / 2;
      const dftm = state.booth.depthFt * FT_TO_M / 2;

      // Floor
      const floorGeo = new THREE.PlaneGeometry(state.booth.widthFt * FT_TO_M, state.booth.depthFt * FT_TO_M);
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      floor.userData = { isBooth: true };
      boothGroup.add(floor);

      // Walls (visual only)
      const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7 });
      const wallH = 3;
      const wallThick = 0.1;

      // West wall
      const westWallGeo = new THREE.BoxGeometry(wallThick, wallH, state.booth.depthFt * FT_TO_M);
      const westWall = new THREE.Mesh(westWallGeo, wallMat);
      westWall.position.set(-wftm, wallH / 2, 0);
      westWall.castShadow = true;
      westWall.userData = { isBooth: true };
      boothGroup.add(westWall);

      // East wall
      const eastWall = new THREE.Mesh(westWallGeo, wallMat);
      eastWall.position.set(wftm, wallH / 2, 0);
      eastWall.castShadow = true;
      eastWall.userData = { isBooth: true };
      boothGroup.add(eastWall);

      // North wall
      const northWallGeo = new THREE.BoxGeometry(state.booth.widthFt * FT_TO_M, wallH, wallThick);
      const northWall = new THREE.Mesh(northWallGeo, wallMat);
      northWall.position.set(0, wallH / 2, -dftm);
      northWall.castShadow = true;
      northWall.userData = { isBooth: true };
      boothGroup.add(northWall);

      // South wall
      const southWall = new THREE.Mesh(northWallGeo, wallMat);
      southWall.position.set(0, wallH / 2, dftm);
      southWall.castShadow = true;
      southWall.userData = { isBooth: true };
      boothGroup.add(southWall);
    }

    /* ============ FURNITURE BUILDERS ============ */
    function buildMainStage(instance) {
      const group = new THREE.Group();
      const dims = FURNITURE_DIMS.MAIN_STAGE;

      const geo = new THREE.CylinderGeometry(dims.width / 2, dims.width / 2, dims.height, 16);
      const mat = new THREE.MeshStandardMaterial({
        color: FURNITURE_COLORS.MAIN_STAGE,
        roughness: 0.6,
        metalness: 0.4,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.y = dims.height / 2;
      group.add(mesh);

      // LED strip (emissive)
      const stripGeo = new THREE.BoxGeometry(dims.width - 0.1, 0.05, dims.width - 0.1);
      const stripMat = new THREE.MeshStandardMaterial({
        color: 0x00D9FF,
        emissive: 0x00D9FF,
        emissiveIntensity: 0.8,
      });
      const strip = new THREE.Mesh(stripGeo, stripMat);
      strip.position.y = dims.height + 0.05;
      group.add(strip);

      return group;

    function buildProductShelf(instance) {
      const group = new THREE.Group();
      const dims = FURNITURE_DIMS.PRODUCT_SHELF;

      const mainGeo = new THREE.BoxGeometry(dims.width, dims.height, dims.depth);
      const mat = new THREE.MeshStandardMaterial({

        roughness: 0.7,

      const mainMesh = new THREE.Mesh(mainGeo, mat);
      mainMesh.castShadow = true;
      mainMesh.receiveShadow = true;
      mainMesh.position.y = dims.height / 2;

      for (let i = 0; i < 3; i++) {

        const shelf = new THREE.Mesh(shelfGeo, shelfMat);
        shelf.position.y = 0.3 + i * 0.35;

    function buildScreenWall(instance) {

      const screenMat = new THREE.MeshStandardMaterial({

      const screen = new THREE.Mesh(screenGeo, screenMat);

    function buildExperienceZone(instance) {
      const group = new THREE.Group();
      const dims = FURNITURE_DIMS.EXPERIENCE_ZONE;

      const floorGeo = new THREE.PlaneGeometry(dims.width, dims.depth);
      const floorMat = new THREE.MeshStandardMaterial({
        color: FURNITURE_COLORS.EXPERIENCE_ZONE,
        transparent: true,
        opacity: 0.3,
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      group.add(floor);

      // Corner markers
      const markerGeo = new THREE.BoxGeometry(0.1, 0.05, 0.1);
      const markerMat = new THREE.MeshStandardMaterial({ color: 0x00D9FF });
      const corners = [
        [-dims.width / 2, -dims.depth / 2],
        [dims.width / 2, -dims.depth / 2],
        [-dims.width / 2, dims.depth / 2],
        [dims.width / 2, dims.depth / 2],
      ];
      corners.forEach(([x, z]) => {
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(x, 0.03, z);
        group.add(marker);
      });

      return group;
    }

    function buildInfoDesk(instance) {
      const group = new THREE.Group();
      const dims = FURNITURE_DIMS.INFO_DESK;

      const counterGeo = new THREE.BoxGeometry(dims.width, dims.height - 0.2, dims.depth);
      const mat = new THREE.MeshStandardMaterial({ color: FURNITURE_COLORS.INFO_DESK });
      const counter = new THREE.Mesh(counterGeo, mat);
      counter.castShadow = true;
      counter.receiveShadow = true;
      counter.position.y = (dims.height - 0.2) / 2;
      group.add(counter);

      // Top
      const topGeo = new THREE.BoxGeometry(dims.width, 0.05, dims.depth);
      const topMat = new THREE.MeshStandardMaterial({ color: 0xa0a0a0 });
      const top = new THREE.Mesh(topGeo, topMat);
      top.position.y = dims.height;
      top.castShadow = true;
      group.add(top);

      return group;
    }

    const FURNITURE_BUILDERS = {
      MAIN_STAGE: buildMainStage,
      PRODUCT_SHELF: buildProductShelf,
      SCREEN_WALL: buildScreenWall,
      EXPERIENCE_ZONE: buildExperienceZone,
      INFO_DESK: buildInfoDesk,
    };

    function rebuildFurniture() {
      furnitureGroup.clear();
      furnitureMeshes = {};

      state.furniture.forEach(f => {
        const builder = FURNITURE_BUILDERS[f.type];
        if (!builder) return;
        const group = builder(f);
        group.position.set(f.x, 0, f.z);
        group.rotation.y = f.rotY;
        group.userData = { isFurniture: true, furnitureId: f.id };
        furnitureGroup.add(group);
        furnitureMeshes[f.id] = { group, instance: f };
      });
    }

    /* ============ FURNITURE SNAP ============ */
    function applySnap(furniture, rawX, rawZ) {
      const hw = state.booth.widthFt * FT_TO_M / 2;
      const hd = state.booth.depthFt * FT_TO_M / 2;
      const dims = FURNITURE_DIMS[furniture.type];
      const needsSnap = FURNITURE_SNAP[furniture.type] === 'wall';

      let x = rawX, z = rawZ, rotY = furniture.rotY;

      if (needsSnap) {
        const distances = {
          west: Math.abs(rawX - (-hw + dims.width / 2 * FT_TO_M)),
          east: Math.abs(rawX - (hw - dims.width / 2 * FT_TO_M)),
          north: Math.abs(rawZ - (-hd + dims.depth / 2 * FT_TO_M)),
          south: Math.abs(rawZ - (hd - dims.depth / 2 * FT_TO_M)),
        };
        const minWall = Object.entries(distances).reduce((a, b) => a[1] < b[1] ? a : b);
        if (minWall[1] < WALL_SNAP_DIST) {
          if (minWall[0] === 'west') {
            x = -hw + dims.width / 2 * FT_TO_M;
            rotY = Math.PI / 2;
          }
          if (minWall[0] === 'east') {
            x = hw - dims.width / 2 * FT_TO_M;
            rotY = -Math.PI / 2;
          }
          if (minWall[0] === 'north') {
            z = -hd + dims.depth / 2 * FT_TO_M;
            rotY = 0;
          }
          if (minWall[0] === 'south') {
            z = hd - dims.depth / 2 * FT_TO_M;
            rotY = Math.PI;
          }
        }
      }

      // Clamp to booth bounds
      const marginX = dims.width / 2 * FT_TO_M;
      const marginZ = dims.depth / 2 * FT_TO_M;
      x = Math.max(-hw + marginX, Math.min(hw - marginX, x));
      z = Math.max(-hd + marginZ, Math.min(hd - marginZ, z));

      return { x, z, rotY };
    }

    /* ============ ROBOTS (STUB) ============ */
    function buildHumanoid(color, height = 1.7) {
      const root = new THREE.Group();

      // Simplified humanoid
      const bodyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.5, 8);
      const bodyMat = new THREE.MeshStandardMaterial({ color });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.castShadow = true;
      body.position.y = height * 0.5;
      root.add(body);

      // Head
      const headGeo = new THREE.SphereGeometry(0.15, 16, 12);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
      const head = new THREE.Mesh(headGeo, headMat);
      head.name = 'head';
      head.castShadow = true;
      head.position.set(0, height * 0.85, 0);
      root.add(head);

      // Arms
      const armGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8);
      const armMat = new THREE.MeshStandardMaterial({ color });

      const armR = new THREE.Mesh(armGeo, armMat);
      armR.name = 'armR';
      armR.castShadow = true;
      armR.position.set(0.25, height * 0.65, 0);
      root.add(armR);

      const armL = new THREE.Mesh(armGeo, armMat);
      armL.name = 'armL';
      armL.castShadow = true;
      armL.position.set(-0.25, height * 0.65, 0);
      root.add(armL);

      // Legs
      const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.7, 8);
      const legMat = new THREE.MeshStandardMaterial({ color });

      const legL = new THREE.Mesh(legGeo, legMat);
      legL.name = 'legL';
      legL.castShadow = true;
      legL.position.set(-0.1, height * 0.35, 0);
      root.add(legL);

      const legR = new THREE.Mesh(legGeo, legMat);
      legR.name = 'legR';
      legR.castShadow = true;
      legR.position.set(0.1, height * 0.35, 0);
      root.add(legR);

      return root;
    }

    function buildCompanion(color) {
      const root = new THREE.Group();
      const geo = new THREE.BoxGeometry(0.4, 0.6, 0.4);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.position.y = 0.3;
      root.add(mesh);
      return root;
    }

    function buildService(color) {
      const root = new THREE.Group();
      const geo = new THREE.CylinderGeometry(0.3, 0.35, 0.8, 16);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.position.y = 0.4;
      root.add(mesh);
      return root;
    }

    function buildStation(color) {
      const root = new THREE.Group();
      const geo = new THREE.BoxGeometry(0.8, 1.0, 0.6);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.position.y = 0.5;
      root.add(mesh);
      return root;

    const ROBOT_BUILDERS = {
      humanoid: buildHumanoid,
      companion: buildCompanion,
      service: buildService,
      station: buildStation,
    };

    /* ============ UI RENDERING ============ */
    function renderCatalog() {
      const catalog = document.getElementById('furnitureCatalog');
      catalog.innerHTML = '';
      Object.entries(FURNITURE_TYPES).forEach(([key, type]) => {
        const dims = FURNITURE_DIMS[type];
        const item = document.createElement('div');
        item.className = 'catalog-item';
        item.innerHTML = `
          <div class="catalog-item-name">${type.replace(/_/g, ' ')}</div>
          <div class="catalog-item-dims">${dims.width.toFixed(1)} × ${dims.depth.toFixed(1)} × ${dims.height.toFixed(1)} m</div>
        `;
        item.addEventListener('click', () => addFurniture(type));
        catalog.appendChild(item);
      });
    }

    function renderPlacedFurniture() {
      const list = document.getElementById('placedFurnitureList');
      list.innerHTML = '';
      state.furniture.forEach(f => {
        const item = document.createElement('div');
        item.className = `placed-item ${state.selectedType === 'furniture' && state.selectedId === f.id ? 'selected' : ''}`;
        item.innerHTML = `<div>${f.name}</div>`;
        item.addEventListener('click', () => selectFurniture(f.id));
        list.appendChild(item);
      });
    }

    function renderRobotList() {
      const list = document.getElementById('robotList');
      list.innerHTML = '';
      state.robots.forEach(r => {
        const item = document.createElement('div');
        item.className = `placed-item ${state.selectedType === 'robot' && state.selectedId === r.id ? 'selected' : ''}`;
        item.innerHTML = `<div>${r.name}</div>`;
        item.addEventListener('click', () => selectRobot(r.id));
        list.appendChild(item);
      });
    }

    function updateHUD() {
      document.getElementById('hudMode').textContent = state.mode.toUpperCase();
      document.getElementById('hudBooth').textContent = `${state.booth.widthFt} × ${state.booth.depthFt}`;
      document.getElementById('hudItems').textContent = `${state.furniture.length} furniture / ${state.robots.length} robots`;
    }

    /* ============ INTERACTIONS ============ */
    function addFurniture(type) {
      const id = generateId('f');
      const instance = {
        id,
        type,
        name: `${type.replace(/_/g, ' ')} ${state.furniture.length + 1}`,
        x: 0,
        z: 0,
        rotY: 0,
        scale: 1.0,
      };
      state.furniture.push(instance);
      rebuildFurniture();
      renderPlacedFurniture();
      updateHUD();
      selectFurniture(id);
      showToast(`Added ${type}`, 'success');
    }

    function selectFurniture(id) {
      state.selectedType = 'furniture';
      state.selectedId = id;
      renderPlacedFurniture();
      updatePropertiesPanel();
    }

    function selectRobot(id) {
      state.selectedType = 'robot';
      state.selectedId = id;
      renderRobotList();
      updatePropertiesPanel();
    }

    function updatePropertiesPanel() {
      document.getElementById('propertiesFurniture').classList.remove('active');
      document.getElementById('propertiesRobot').classList.remove('active');
      document.getElementById('propertiesGesture').classList.remove('active');

      if (state.selectedType === 'furniture') {
        const f = state.furniture.find(x => x.id === state.selectedId);
        if (!f) return;

        document.getElementById('propertiesFurniture').classList.add('active');
        document.getElementById('propFurnitureName').value = f.name;
        document.getElementById('propFurnitureType').textContent = f.type;
        document.getElementById('propFurnitureX').value = (f.x / FT_TO_M).toFixed(1);
        document.getElementById('propFurnitureZ').value = (f.z / FT_TO_M).toFixed(1);
        document.getElementById('propFurnitureRotY').value = (f.rotY * 180 / Math.PI).toFixed(0);
        const dims = FURNITURE_DIMS[f.type];
        document.getElementById('propFurnitureDims').textContent = `${dims.width} × ${dims.depth} × ${dims.height} m`;
      }
    }

    /* ============ KEYBOARD ============ */
    document.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        toggleMode();
      }
      if (e.key === ' ') {
        e.preventDefault();
        state.playing = !state.playing;
      }
      if (e.key === 'Escape') {
        state.selectedType = null;
        state.selectedId = null;
        renderPlacedFurniture();
        updatePropertiesPanel();
      }
      if (e.key === 'Delete') {
        if (state.selectedType === 'furniture') {
          state.furniture = state.furniture.filter(f => f.id !== state.selectedId);
          state.selectedId = null;
          rebuildFurniture();
          renderPlacedFurniture();
          updatePropertiesPanel();
          updateHUD();
        }
      }
      if (e.key === 'r' || e.key === 'R') {
        if (state.selectedType === 'furniture') {
          const f = state.furniture.find(x => x.id === state.selectedId);
          if (f) {
            f.rotY += Math.PI / 2;
            rebuildFurniture();
          }
        }
      }
    });

    /* ============ MODE TOGGLE ============ */
    document.querySelectorAll('.mode-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        if (mode) toggleToMode(mode);
      });
    });

    function toggleMode() {
      toggleToMode(state.mode === 'build' ? 'choreo' : 'build');
    }

    function toggleToMode(mode) {
      state.mode = mode;
      document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
      document.querySelector(`.mode-toggle button[data-mode="${mode}"]`).classList.add('active');

      document.getElementById('buildMode').style.display = mode === 'build' ? 'block' : 'none';
      document.getElementById('choreoMode').style.display = mode === 'choreo' ? 'block' : 'none';

      updateHUD();
    }

    /* ============ MOUSE INTERACTIONS ============ */
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      // Compute floor hit for HUD
      raycaster.setFromCamera(mouse, camera);
      const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const hitPoint = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, hitPoint);
      const xft = (hitPoint.x / FT_TO_M).toFixed(1);
      const zft = (hitPoint.z / FT_TO_M).toFixed(1);
      document.getElementById('hudCursor').textContent = `${xft}, ${zft}`;
    });

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      if (state.mode === 'build') {
        const hits = raycaster.intersectObjects(furnitureGroup.children, true);
        if (hits.length > 0) {
          let node = hits[0].object;
          while (node && !node.userData?.isFurniture) node = node.parent;
          if (node) selectFurniture(node.userData.furnitureId);
        } else {
          state.selectedType = null;
          state.selectedId = null;
          renderPlacedFurniture();
          updatePropertiesPanel();
        }
      }
    });

    /* ============ PROPERTY PANEL EVENTS ============ */
    document.getElementById('propFurnitureName').addEventListener('change', e => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.name = e.target.value;
        renderPlacedFurniture();
      }
    });

    document.getElementById('propFurnitureX').addEventListener('change', e => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.x = parseFloat(e.target.value) * FT_TO_M;
        const snapped = applySnap(f, f.x, f.z);
        f.x = snapped.x;
        f.z = snapped.z;
        f.rotY = snapped.rotY;
        rebuildFurniture();
        updatePropertiesPanel();
      }
    });

    document.getElementById('propFurnitureZ').addEventListener('change', e => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.z = parseFloat(e.target.value) * FT_TO_M;
        const snapped = applySnap(f, f.x, f.z);
        f.x = snapped.x;
        f.z = snapped.z;
        f.rotY = snapped.rotY;
        rebuildFurniture();
        updatePropertiesPanel();
      }
    });

    document.getElementById('propFurnitureRotY').addEventListener('change', e => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.rotY = parseFloat(e.target.value) * Math.PI / 180;
        rebuildFurniture();
      }
    });

    document.getElementById('propFurnitureDelete').addEventListener('click', () => {
      state.furniture = state.furniture.filter(f => f.id !== state.selectedId);
      state.selectedId = null;
      rebuildFurniture();
      renderPlacedFurniture();
      updatePropertiesPanel();
      updateHUD();
      showToast('Furniture deleted', 'success');
    });

    document.getElementById('propFurnitureDuplicate').addEventListener('click', () => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        const dup = { ...f, id: generateId('f'), x: f.x + 0.5 * FT_TO_M, z: f.z + 0.5 * FT_TO_M };
        state.furniture.push(dup);
        rebuildFurniture();
        renderPlacedFurniture();
        updateHUD();
        showToast('Furniture duplicated', 'success');
      }
    });

    document.getElementById('propFurnitureResetRot').addEventListener('click', () => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.rotY = 0;
        rebuildFurniture();
        updatePropertiesPanel();
      }
    });

    document.getElementById('propFurnitureCenter').addEventListener('click', () => {
      const f = state.furniture.find(x => x.id === state.selectedId);
      if (f) {
        f.x = 0;
        f.z = 0;
        rebuildFurniture();
        updatePropertiesPanel();
      }
    });

    /* ============ SAVE / LOAD / EXPORT ============ */
    function serializeScenario() {
      return {
        schema: 'cloid-exhibition-sim-v0.2',
        name: document.getElementById('scenarioName').value,
        savedAt: new Date().toISOString(),
        booth: state.booth,
        duration: state.duration,
        furniture: state.furniture,
        robots: state.robots,
      };
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      const data = serializeScenario();
      localStorage.setItem('cloid_scenario', JSON.stringify(data));
      showToast('Scenario saved', 'success');
    });

    document.getElementById('loadBtn').addEventListener('click', () => {
      const saved = localStorage.getItem('cloid_scenario');
      if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('scenarioName').value = data.name;
        state.booth = data.booth;
        state.furniture = data.furniture || [];
        state.robots = data.robots || [];
        rebuildBooth();
        rebuildFurniture();
        renderPlacedFurniture();
        updateHUD();
        showToast('Scenario loaded', 'success');
      } else {
        showToast('No saved scenario found', 'error');
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const data = serializeScenario();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${data.name || 'scenario'}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Scenario exported', 'success');
    });

    /* ============ ANIMATION LOOP ============ */
    function tick() {
      requestAnimationFrame(tick);

      if (state.playing) {
        state.currentTime += 1 / 60;
        if (state.currentTime > state.duration) {
          state.currentTime = 0;
        }
      }

      renderer.render(scene, camera);
    }

    /* ============ INITIALIZATION ============ */
    window.addEventListener('resize', () => {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    rebuildBooth();
    renderCatalog();
    renderPlacedFurniture();
    renderRobotList();
    updateHUD();
    tick();

    showToast('Phase 0.5 initialized - Press TAB to toggle BUILD/CHOREO', 'success');
  </script>
</body>
</html>
